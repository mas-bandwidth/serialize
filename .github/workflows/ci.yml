name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]   # linux x64, macos apple silicon, windows x64
        build_type: [Debug, Release]
        include:
          - os: windows-2025
            cmake_args: -A x64
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

      # indicative only: shared runners are noisy. compare trends, not absolute numbers.
      - name: Benchmark
        if: matrix.build_type == 'Release'
        shell: bash
        run: |
          if [ -f build/bin/Release/bench.exe ]; then
            ./build/bin/Release/bench.exe
          else
            ./build/bin/bench
          fi

  # the only big endian coverage in the matrix: exercises the bswap / host_to_network
  # path for real, and the golden wire format test proves the wire bytes are identical
  big-endian:
    name: big endian s390x / ${{ matrix.build_type }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Install s390x cross toolchain and qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-s390x-linux-gnu qemu-user-static

      # static linking so the emulated binaries need no s390x sysroot at runtime
      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_SYSTEM_NAME=Linux
          -DCMAKE_SYSTEM_PROCESSOR=s390x
          -DCMAKE_CXX_COMPILER=s390x-linux-gnu-g++
          -DCMAKE_CXX_FLAGS="-static"
          -DCMAKE_CROSSCOMPILING_EMULATOR=qemu-s390x-static

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  fuzz:
    name: fuzz (libFuzzer)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DSERIALIZE_FUZZ=ON -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build --parallel

      - name: Fuzz
        run: ./build/bin/fuzz -max_total_time=60 -timeout=10 -print_final_stats=1

  sanitizers:
    name: asan + ubsan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
